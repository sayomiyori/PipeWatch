name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check app cli tests

      - name: Pytest
        run: pytest -q

      - name: Docker build
        run: docker build -t pipewatch:ci .
