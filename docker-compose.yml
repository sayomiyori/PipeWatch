services:
  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "18123:8123"
      - "19000:9000"
    environment:
      - CLICKHOUSE_DB=pipewatch
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=pipewatch
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: [ "CMD", "sh", "-c", "clickhouse-client --query 'SELECT 1'" ]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7
    ports:
      - "16379:6379"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18080:8000"
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=pipewatch
      - CLICKHOUSE_DATABASE=pipewatch
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_BATCH_FLUSH_INTERVAL_SECONDS=1
      - APP_BATCH_SIZE=1000
      - ALERT_EVAL_INTERVAL_SECONDS=30
      - ALERT_COOLDOWN_SECONDS=300
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "19090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "13000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:13000
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  clickhouse_data:
